<script>
// ==============================
// CONFIG API-FOOTBALL
// ==============================
const API_KEY = '404e6895681567ee77f866b6d89671e2';
const API_URL = 'https://v3.football.api-sports.io';
const COPA_LEAGUE_ID = 1; // FIFA World Cup
const SEASON = 2026;

// Mapeamento de nomes da API para nomes do bolão
const TEAM_MAP = {
  'Mexico': 'México', 'South Africa': 'África do Sul', 'South Korea': 'Coreia do Sul',
  'Czech Republic': 'Rep. Tcheca', 'Canada': 'Canadá', 'Qatar': 'Catar',
  'Switzerland': 'Suíça', 'Bosnia': 'Bósnia', 'Brazil': 'Brasil', 'Morocco': 'Marrocos',
  'Haiti': 'Haiti', 'Scotland': 'Escócia', 'USA': 'EUA', 'United States': 'EUA',
  'Paraguay': 'Paraguai', 'Australia': 'Austrália', 'Turkey': 'Turquia',
  'Germany': 'Alemanha', 'Curacao': 'Curaçao', "Ivory Coast": 'Costa do Marfim',
  'Ecuador': 'Equador', 'Netherlands': 'Holanda', 'Japan': 'Japão',
  'Tunisia': 'Tunísia', 'Sweden': 'Suécia', 'Belgium': 'Bélgica', 'Egypt': 'Egito',
  'Iran': 'Irã', 'New Zealand': 'Nova Zelândia', 'Spain': 'Espanha',
  'Cape Verde': 'Cabo Verde', 'Saudi Arabia': 'Arábia Saudita', 'Uruguay': 'Uruguai',
  'France': 'França', 'Senegal': 'Senegal', 'Norway': 'Noruega', 'Bolivia': 'Bolívia',
  'Argentina': 'Argentina', 'Algeria': 'Argélia', 'Austria': 'Áustria',
  'Jordan': 'Jordânia', 'Portugal': 'Portugal', 'Uzbekistan': 'Uzbequistão',
  'Colombia': 'Colômbia', 'DR Congo': 'Rep. Congo', 'England': 'Inglaterra',
  'Croatia': 'Croácia', 'Ghana': 'Gana', 'Panama': 'Panamá',
};

function mapTeam(name) { return TEAM_MAP[name] || name; }

// ==============================
// ESTADO GLOBAL
// ==============================
let todosPalpites = [];
let resultadosReais = []; // [{home, away, homeGoals, awayGoals, round, status}]
let artilheiroReal = null;
let nomeJogador = '';
let currentTab = 'ranking';

// ==============================
// BUSCAR RESULTADOS DA API
// ==============================
async function buscarResultadosAPI() {
  try {
    document.getElementById('api-status-label').textContent = 'Buscando resultados...';
    const res = await fetch(API_URL + '/fixtures?league=' + COPA_LEAGUE_ID + '&season=' + SEASON, {
      headers: { 'x-apisports-key': API_KEY }
    });
    const data = await res.json();
    if (!data.response) throw new Error('Sem resposta');

    resultadosReais = data.response
      .filter(f => f.fixture.status.short === 'FT' || f.fixture.status.short === 'AET' || f.fixture.status.short === 'PEN')
      .map(f => ({
        home: mapTeam(f.teams.home.name),
        away: mapTeam(f.teams.away.name),
        homeGoals: f.goals.home,
        awayGoals: f.goals.away,
        round: f.league.round,
        date: f.fixture.date,
      }));

    document.getElementById('stat-jogos').textContent = resultadosReais.length;
    const apiInfo = document.getElementById('api-info');

    if (resultadosReais.length > 0) {
      document.getElementById('api-status-label').textContent = 'API ao vivo ✓';
      apiInfo.innerHTML = '✅ <strong style="color:var(--green)">' + resultadosReais.length + ' jogos</strong> com resultado real da API. Pontos calculados automaticamente!';
    } else {
      document.getElementById('api-status-label').textContent = 'Aguardando Copa';
      apiInfo.innerHTML = '⏳ A Copa começa em <strong style="color:var(--gold)">11 de junho</strong>. Assim que os jogos começarem, os pontos serão calculados automaticamente!';
      document.getElementById('stat-jogos').textContent = '0';
    }

    // Buscar artilheiro
    buscarArtilheiro();
    return true;
  } catch(e) {
    console.error('Erro API:', e);
    document.getElementById('api-status-label').textContent = 'Erro na API';
    document.getElementById('api-info').innerHTML = '⚠️ Não foi possível buscar resultados da API agora. Tente recarregar a página.';
    document.getElementById('stat-jogos').textContent = '?';
    return false;
  }
}

async function buscarArtilheiro() {
  try {
    const res = await fetch(API_URL + '/players/topscorers?league=' + COPA_LEAGUE_ID + '&season=' + SEASON, {
      headers: { 'x-apisports-key': API_KEY }
    });
    const data = await res.json();
    if (data.response && data.response.length > 0) {
      artilheiroReal = data.response[0].player.name;
    }
  } catch(e) { artilheiroReal = null; }
}

// ==============================
// CALCULAR PONTOS
// ==============================
function calcularPontos(palpite) {
  let pts = 0, exatos = 0, vencedores = 0, avancos = 0;

  // Jogos de grupo: compara com resultados reais
  if (palpite.jogos) {
    Object.entries(palpite.jogos).forEach(([id, pal]) => {
      if (pal.t1 === '' || pal.t2 === '') return;
      // Busca o jogo real pelo ID
      const jogoInfo = buscarJogoPorId(id);
      if (!jogoInfo) return;
      const real = resultadosReais.find(r =>
        (r.home === jogoInfo.t1 && r.away === jogoInfo.t2) ||
        (r.home === jogoInfo.t2 && r.away === jogoInfo.t1)
      );
      if (!real) return;

      const p1 = parseInt(pal.t1), p2 = parseInt(pal.t2);
      let r1 = real.homeGoals, r2 = real.awayGoals;
      // Ajusta ordem se times invertidos
      if (real.home === jogoInfo.t2) { r1 = real.awayGoals; r2 = real.homeGoals; }

      if (p1 === r1 && p2 === r2) { pts += 7; exatos++; }
      else if ((p1 > p2 && r1 > r2) || (p1 < p2 && r1 < r2) || (p1 === p2 && r1 === r2)) { pts += 3; vencedores++; }
    });
  }

  // Classificados: quem passou de cada grupo (+3 cada acerto)
  // (simplificado: comparar com dados reais quando disponíveis)

  // Bracket mata-mata: quem avançou (+5 cada)
  if (palpite.bracket) {
    Object.entries(palpite.bracket).forEach(([fase, jogos]) => {
      Object.entries(jogos).forEach(([jogoId, time]) => {
        const timeReal = verificarAvanco(fase, jogoId, time.nome);
        if (timeReal) { pts += 5; avancos++; }
      });
    });
  }

  // Artilheiro (+10)
  if (artilheiroReal && palpite.especiais?.artilheiro) {
    if (palpite.especiais.artilheiro.toLowerCase().trim() === artilheiroReal.toLowerCase().trim()) pts += 10;
  }

  // MVP e Goleiro (ainda não disponível na API gratuita)

  return { pts, exatos, vencedores, avancos };
}

function verificarAvanco(fase, jogoId, timeNome) {

  // Por enquanto retorna false até ter dados reais do mata-mata

}

    GA5:{t1:'México',t2:'Rep. Tcheca'}, GA6:{t1:'África do Sul',t2:'Coreia do Sul'},

    GC1:{t1:'Brasil',t2:'Marrocos'}, GC2:{t1:'Haiti',t2:'Escócia'},
    GC3:{t1:'Brasil',t2:'Haiti'}, GC4:{t1:'Marrocos',t2:'Escócia'},

// ==============================
// RENDER RANKING
// ==============================
function recalcularERenderizar() {
  if (!todosPalpites.length) {
    document.getElementById('loading-ranking').textContent = '📭 Nenhum palpite cadastrado ainda.';
    return;
  }

  const ranked = todosPalpites.map(p => {
    const { pts, exatos, vencedores, avancos } = calcularPontos(p);
    return { ...p, pts, exatos, vencedores, avancos };
  }).sort((a,b) => b.pts - a.pts || b.exatos - a.exatos);

  document.getElementById('stat-participantes').textContent = ranked.length;
  if (ranked[0]) document.getElementById('stat-lider').textContent = ranked[0].nome?.split(' ')[0] || '—';

  renderPodium(ranked);
  renderRanking(ranked);
  renderResultados();
}

function renderPodium(ranked) {
  const podium = document.getElementById('podium');
  if (ranked.length < 1) return;
  podium.style.display = 'grid';
  const medals = ['🥇','🥈','🥉'];
  const classes = ['first','second','third'];
  const ptsClasses = ['gold','silver','bronze'];
  const order = ranked.length >= 3 ? [ranked[1],ranked[0],ranked[2]] : ranked.length === 2 ? [ranked[1],ranked[0]] : [ranked[0]];
  podium.innerHTML = order.map(p => {
    const ri = ranked.indexOf(p);
    return '<div class="podium-item ' + (classes[ri]||'') + '">' +
      '<div class="podium-medal">' + (medals[ri]||'🏅') + '</div>' +
      '<p class="podium-name">' + (p.nome||'?') + '</p>' +
      '<p class="podium-pts ' + (ptsClasses[ri]||'') + '">' + p.pts + '</p>' +
      '<p class="podium-label">pontos</p>' +
    '</div>';
  }).join('');
}

function renderRanking(ranked) {
  const list = document.getElementById('ranking-list');
  document.getElementById('loading-ranking').style.display = 'none';
  list.style.display = 'flex';
  list.innerHTML = ranked.map((p,i) => {
    const isMe = p.nome === nomeJogador;
    const iniciais = (p.nome||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    return '<div class="rank-row ' + (isMe?'me':'') + '">' +
      '<div class="rank-pos">' + (i+1) + '</div>' +
      '<div class="rank-avatar ' + (isMe?'me-avatar':'') + '">' + iniciais + '</div>' +
      '<div class="rank-name">' + (p.nome||'?') + (isMe ? '<span class="me-tag">você</span>' : '') + '</div>' +
      '<div class="rank-details">' +
        '<div class="rank-detail-item"><div class="rank-detail-val">' + p.exatos + '</div><div class="rank-detail-label">Exatos</div></div>' +
        '<div class="rank-detail-item"><div class="rank-detail-val">' + p.vencedores + '</div><div class="rank-detail-label">Venced.</div></div>' +
        '<div class="rank-detail-item"><div class="rank-detail-val">' + p.avancos + '</div><div class="rank-detail-label">Avanços</div></div>' +
      '</div>' +
      '<div><div class="rank-pts">' + p.pts + '</div><div class="rank-pts-label">pts</div></div>' +
    '</div>';
  }).join('');
}

function renderResultados() {
  const el = document.getElementById('results-display');
  document.getElementById('loading-results').style.display = 'none';
  el.style.display = 'flex';
  if (!resultadosReais.length) {
    el.innerHTML = '<div class="empty">⚽ Nenhum jogo finalizado ainda.<br><strong style="color:var(--gold)">A Copa começa em 11 de junho!</strong><br><br>Assim que os jogos terminarem, os resultados aparecem aqui automaticamente.</div>';
    return;
  }
  el.innerHTML = resultadosReais.map(r =>
    '<div class="result-item">' +
      '<div><div class="result-teams">' + r.home + ' × ' + r.away + '</div><div class="result-round">' + r.round + '</div></div>' +
      '<div class="result-score">' + r.homeGoals + ' – ' + r.awayGoals + '</div>' +
    '</div>'
  ).join('');
}

// ==============================
// TABS
// ==============================
function setTab(tab, btn) {
  currentTab = tab;
  ['ranking','resultados'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ==============================
// INIT
// ==============================
async function init() {
  nomeJogador = sessionStorage.getItem('nomeJogador') || '';
  const { collection, onSnapshot } = window.dbFuncs;

  // Escuta palpites em tempo real
  onSnapshot(collection(window.db, 'palpites'), snap => {
    todosPalpites = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    recalcularERenderizar();
  });

  // Busca resultados da API
  await buscarResultadosAPI();
  recalcularERenderizar();

  // Atualiza a cada 5 minutos automaticamente
  setInterval(async () => {
    await buscarResultadosAPI();
    recalcularERenderizar();
  }, 5 * 60 * 1000);
}

if (window.firebaseReady) init();
else document.addEventListener('firebaseReady', init);
</script>
</body>
</html>
